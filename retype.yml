# Retype configuration
# Docs: https://retype.com/configuration/project/

name: BSc Code Index
description: C programs from BSc semester coursework by Amit Dutta

# The URL where the site is published
url: https://notamitgamer.github.io/bsc/

branding:
  title: BSc Code Index
  label: bsc

links:
  - text: GitHub
    link: https://github.com/notamitgamer/bsc
    icon: mark-github

# Retype reads MD files from this folder (relative to this yml file)
# Place retype.yml in G:\bsc\ so input: docs → G:\bsc\docs\
input: docs-retype

# Output folder for generated site
output: docs

# Enable search (default: true — explicit for clarity)
search:
  hotkeys:
    - "/"
  maxResults: 20
  placeholder: Search programs...

# Navigation depth (3 = Semester → Subfolder → File)
nav:
  mode: default

# Code block settings
code:
  lineNumbers: true

# Footer with hyperlinked copyright and license
footer:
  copyright: "© [amit.is-a.dev](https://amit.is-a.dev) · [notamitgamer](https://github.com/notamitgamer) · [MIT License](https://github.com/notamitgamer/bsc/blob/main/LICENSE)"

poweredByRetype: false