name: Manual and Auto Sync to Hugging Face

on:
  workflow_dispatch:
  push:
    branches:
      - main 

jobs:
  sync-dataset:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Filter Large Files and Sync to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git rm -rf --cached MinGW64 || true
          
          find . -name "*.exe" -exec git rm --cached {} + || true

          git commit -m "Filter out large compiler binaries for HF sync" || true
          
          git push --force https://notamitgamer:$HF_TOKEN@huggingface.co/datasets/notamitgamer/usercontent HEAD:main
