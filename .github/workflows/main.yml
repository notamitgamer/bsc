name: Build and Deploy Docs

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'docs/**' 
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  build-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.x

      - name: Install MkDocs and Plugins
        run: |
          pip install mkdocs-material
          pip install mkdocs-awesome-pages-plugin

      - name: Delete old docs folder
        run: rm -rf docs

      - name: Build MkDocs site
        run: mkdocs build -f utils/mkdocs.yml

      - name: Rename 'site' to 'docs'
        run: mv site docs

      - name: Commit and Push changes
        run: |
          # Set up the bot's git identity
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Stage the new docs folder
          git add docs/
          
          # Only commit and push if there are actual changes
          if ! git diff-index --quiet HEAD; then
            git commit -m "chore: auto-generate GitHub Pages docs"
            git push
            echo "Successfully built and pushed new docs folder."
          else
            echo "No changes to docs detected, skipping commit."
          fi
