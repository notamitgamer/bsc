name: Build and Deploy BSc Code Index

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  sync-hf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GitHub Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1 

      - name: Safe Sync to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git clone https://notamitgamer:${HF_TOKEN}@huggingface.co/datasets/notamitgamer/usercontent /tmp/hf_repo
          
          rsync -av --delete \
            --exclude='.git' \
            --exclude='MinGW64' \
            --exclude='*.exe' \
            --exclude='site_files' \
            $GITHUB_WORKSPACE/ /tmp/hf_repo/

          cd /tmp/hf_repo
          
          git lfs install
          git lfs track "*.pdf"
          git lfs track "*.docx"
          git add .gitattributes
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add .
          
          git commit -m "Safe auto-sync: updating GitHub files while protecting dynamic folders" || echo "No changes to commit"
          
          git push origin main

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate markdown files
        run: |
           python list.py
           python md.py
      
      - name: Generate version file
        run: |
          cat > docs/version.md << EOF
          ---
          title: '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline; margin-bottom:-2px; margin-right:6px;" class="lucide lucide-history"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></svg> Version'
          description: 'Current build information.'
          ---

          # Build Info

          | | |
          |---|---|
          | **Build ID** | \`${{ github.sha }}\` |
          | **Triggered by** | ${{ github.actor }} |
          | **Branch** | ${{ github.ref_name }} |
          | **Build time** | ${{ github.event.head_commit.timestamp }} |
          EOF

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build VitePress
        run: npm run docs:build
        env:
          VITE_DEPLOY_ID: ${{ github.sha }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
